<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
      // Sayfanın yenilenip yenilenmediğini kontrol et
      const navEntry = performance.getEntriesByType("navigation")[0];
      const isReload = navEntry ? navEntry.type === "reload" : false;

      if (isReload) {
        // Eğer kullanıcı sayfayı yenilediyse, kilitli modda index.html'e gönder
        window.location.href = "index.html?source=block";
      } else {
        // İlk defa veya fiziksel olarak okutulduysa rastgele ID ile gönder
        const randomId = Math.floor(Math.random() * 1000000);
        window.location.href = "index.html?source=nfc&id=" + randomId;
      }
    </script>
</head>
<body>
</body>
</html>
