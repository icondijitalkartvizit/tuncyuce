<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
      // Şu anki zamanı milisaniye olarak al (Örn: 1719600000000)
      const timeStamp = new Date().getTime();
      const randomId = Math.floor(Math.random() * 1000000);
      
      // index.html'e hem benzersiz ID'yi hem de üretildiği zamanı gönderiyoruz
      window.location.href = "index.html?source=nfc&id=" + randomId + "&t=" + timeStamp;
    </script>
</head>
<body>
</body>
</html>
